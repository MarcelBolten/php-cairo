name: Build on Windows

on:
    push:
        branches:
            - '*'

jobs:
    get-extension-matrix:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.extension-matrix.outputs.matrix }}
        steps:
        - name: Checkout
          uses: actions/checkout@v5
        - name: Get the extension matrix
          id: extension-matrix
          uses: php/php-windows-builder/extension-matrix@v1
          with:
            extension-url: https://github.com/MarcelBolten/php-cairo
            php-version-list: '8.1, 8.2, 8.3'
            arch-list: 'x86'
            ts-list: 'nts'

    build:
        needs: get-extension-matrix
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.get-extension-matrix.outputs.matrix) }}

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Restore vcpkg cache
              uses: actions/cache/restore@v4
              with:
                path: |
                  C:\vcpkg\installed
                  C:\vcpkg\buildtrees
                key: vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-${{ github.ref_name }}
                restore-keys: |
                  vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-${{ github.ref_name }}
                  vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-

            - name: Setup vcpkg and install dependencies
              shell: powershell
              run: |
                # Clone vcpkg if not cached
                if (!(Test-Path "C:\vcpkg")) {
                    git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
                }
                cd C:\vcpkg

                # Bootstrap if needed
                if (!(Test-Path ".\vcpkg.exe")) {
                    .\bootstrap-vcpkg.bat
                }

                # Set architecture
                $triplet = "${{ matrix.arch }}-windows"

                # Install all required packages
                $packages = @(
                    "cairo:$triplet",
                    "libpng:$triplet",
                    "freetype:$triplet",
                    "fontconfig:$triplet",
                    "pixman:$triplet",
                    "libjpeg-turbo:$triplet",
                    "zlib:$triplet",
                    "bzip2:$triplet",
                    "brotli:$triplet",
                    "expat:$triplet"
                )
                & .\vcpkg install @packages

                Get-ChildItem ".\installed\$triplet\bin" | ForEach-Object { Write-Host $_.Name }

                # Create directory structure config.w32 expects
                New-Item -ItemType Directory -Path "C:\cairo-deps\lib" -Force
                New-Item -ItemType Directory -Path "C:\cairo-deps\include" -Force

                $installPath = ".\installed\$triplet"

                # Copy libraries
                $libs = @(
                  'cairo.lib',
                  'libpng16.lib',
                  'freetype.lib',
                  'fontconfig.lib',
                  'pixman-1.lib',
                  'jpeg.lib',
                  'turbojpeg.lib',
                  'zlib.lib',
                  'bz2.lib',
                  'brotlidec.lib',
                  'brotlicommon.lib',
                  'libexpatMT.lib'
                )
                foreach ($libName in $libs) {
                  $srcPath = Join-Path $installPath "lib\$libName"
                  $dstPath = Join-Path 'C:\cairo-deps\lib' $libName
                  if (Test-Path $srcPath) {
                      Copy-Item -Path $srcPath -Destination $dstPath -Force
                  } else {
                      Write-Host "Warning: $srcPath not found, skipping."
                  }
                }

                # Copy all headers
                Copy-Item -Path "$installPath\include\*" -Destination "C:\cairo-deps\include\" -Recurse -Force

                Write-Host "Libraries installed:"
                Get-ChildItem "C:\cairo-deps\lib\" | ForEach-Object { Write-Host $_.Name }

            - name: Save vcpkg cache
              uses: actions/cache/save@v4
              with:
                path: |
                  C:\vcpkg\installed
                  C:\vcpkg\buildtrees
                key: vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-${{ github.ref_name }}

            - name: Add vcpkg bin to PATH
              run: echo "C:\vcpkg\installed\x86-windows\bin" >> $GITHUB_PATH
              shell: bash

            - name: Build the extension
              uses: php/php-windows-builder/extension@v1
              with:
                php-version: ${{ matrix.php-version }}
                arch: ${{ matrix.arch }}
                ts: ${{ matrix.ts }}
                args: --enable-debug --with-cairo=C:\cairo-deps

            - name: "Upload test outputs"
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                name: cairo-test-${{ matrix.php-version }}-${{ matrix.arch }}-${{ matrix.ts }}
                path: tests/**/*.log
