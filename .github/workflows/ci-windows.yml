name: Build on Windows

on:
    push:
        branches:
            - '*'

jobs:
    get-extension-matrix:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.extension-matrix.outputs.matrix }}
        steps:
        - name: Checkout
          uses: actions/checkout@v5
        - name: Get the extension matrix
          id: extension-matrix
          uses: php/php-windows-builder/extension-matrix@v1
          with:
            extension-url: https://github.com/MarcelBolten/php-cairo
            php-version-list: '8.1, 8.2, 8.3'
            arch-list: 'x86'
            ts-list: 'nts'

    build:
        needs: get-extension-matrix
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.get-extension-matrix.outputs.matrix) }}

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Restore vcpkg cache
              uses: actions/cache/restore@v4
              with:
                path: |
                  C:\vcpkg\installed
                  C:\vcpkg\buildtrees
                key: vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-${{ github.ref_name }}
                restore-keys: |
                  vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-${{ github.ref_name }}
                  vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-

            - name: Setup vcpkg and install dependencies
              shell: powershell
              run: |
                # Clone vcpkg if not cached
                if (!(Test-Path "C:\vcpkg")) {
                    git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
                }
                cd C:\vcpkg

                # Bootstrap if needed
                if (!(Test-Path ".\vcpkg.exe")) {
                    .\bootstrap-vcpkg.bat
                }

                # Set architecture
                $triplet = "x86-windows-php"

                $tripletContent = @"
                set(VCPKG_TARGET_ARCHITECTURE x86)
                set(VCPKG_CRT_LINKAGE dynamic)
                set(VCPKG_LIBRARY_LINKAGE static)
                set(VCPKG_PLATFORM_TOOLSET v142)  # This corresponds to vs16/14.29.30133
                #set(VCPKG_CMAKE_SYSTEM_NAME WindowsStore)
                #set(VCPKG_CMAKE_SYSTEM_VERSION 10.0)
                "@

                New-Item -Path "C:\vcpkg\triplets\community" -Name "$triplet.cmake" -Value $tripletContent -Force

                # Install all required packages
                $packages = @(
                    "cairo:$triplet",
                    "libpng:$triplet",
                    "freetype:$triplet",
                    "fontconfig:$triplet",
                    "pixman:$triplet",
                    "libjpeg-turbo:$triplet",
                    "zlib:$triplet",
                    "bzip2:$triplet",
                    "brotli:$triplet",
                    "expat:$triplet"
                )
                & .\vcpkg install @packages --allow-unsupported

                #Get-ChildItem ".\installed" | ForEach-Object { Write-Host $_.Name }
                #Get-ChildItem ".\installed\x64-windows" | ForEach-Object { Write-Host $_.Name }
                Get-ChildItem ".\installed\$triplet\debug\bin" | ForEach-Object { Write-Host $_.Name }

                # Create directory structure config.w32 expects
                New-Item -ItemType Directory -Path "C:\cairo-deps\lib" -Force
                New-Item -ItemType Directory -Path "C:\cairo-deps\include" -Force

                $installPath = ".\installed\$triplet"

                # Copy libraries
                $libs = @(
                  'cairo.lib',
                  'libpng16.lib',
                  'freetype.lib',
                  'fontconfig.lib',
                  'pixman-1.lib',
                  'jpeg.lib',
                  'turbojpeg.lib',
                  'zlib.lib',
                  'bz2.lib',
                  'brotlidec.lib',
                  'brotlicommon.lib',
                  'libexpatMT.lib'
                )
                foreach ($libName in $libs) {
                  $srcPath = Join-Path $installPath "lib\$libName"
                  $dstPath = Join-Path 'C:\cairo-deps\lib' $libName
                  if (Test-Path -Path $srcPath) {
                      Copy-Item -Path $srcPath -Destination $dstPath -Force
                  } else {
                      Write-Host "Warning: $srcPath not found, skipping."
                  }
                }

                # Copy all headers
                Copy-Item -Path "$installPath\include\*" -Destination "C:\cairo-deps\include\" -Recurse -Force

                Write-Host "Libraries installed:"
                Get-ChildItem "C:\cairo-deps\lib\" | ForEach-Object { Write-Host $_.Name }

            - name: Create simplified filename copies
              run: |
                $folder = "C:\vcpkg\installed\x86-windows\bin"
                $renames = @{
                  "cairo-2.dll" = "cairo.dll"
                  "pixman-1-0.dll" = "pixman-1.dll"
                  "fontconfig-1.dll" = "fontconfig.dll"
                }

                foreach ($original in $renames.Keys) {
                  $src = Join-Path $folder $original
                  $dst = Join-Path $folder $renames[$original]
                  if (Test-Path -Path $src) {
                    Copy-Item -Path $src -Destination $dst -Force
                    Write-Host "Created $($renames[$original]) from $original"
                  } else {
                    Write-Host "Skipping: $src not found"
                  }
                }
              shell: powershell

            - name: Save vcpkg cache
              uses: actions/cache/save@v4
              with:
                path: |
                  C:\vcpkg\installed
                  C:\vcpkg\buildtrees
                key: vcpkg-${{ matrix.arch }}-${{ matrix.php-version }}-${{ github.ref_name }}

            - name: Add vcpkg bin to PATH
              run: echo "C:\vcpkg\installed\x86-windows\bin" >> $GITHUB_PATH
              shell: bash

            - name: Verify DLL accessibility
              run: |
                # Write-Output "Extension location:"
                # Get-ChildItem "build\*\Release\php_cairo.dll" -Recurse

                Write-Output "Available DLLs in vcpkg bin:"
                Get-ChildItem "C:\vcpkg\installed\x86-windows\bin\*.dll" | Select-Object Name

                Write-Output "PATH entries containing vcpkg:"
                $env:PATH -split ';' | Where-Object { $_ -like "*vcpkg*" }
              shell: pwsh

            - name: Build the extension
              uses: php/php-windows-builder/extension@v1
              with:
                php-version: ${{ matrix.php-version }}
                arch: ${{ matrix.arch }}
                ts: ${{ matrix.ts }}
                args: --enable-debug --with-cairo=C:\cairo-deps

            - name: List build output
              run: |
                Get-ChildItem -Path "D:\a\php-cairo\php-cairo\build\*\Release\" -Recurse | Format-Table -Property Mode, Length, LastWriteTime, Name
              shell: powershell

            # - name: Check DLL dependencies
            #   run: |
            #     # Find the DLL dynamically
            #     $dllPath = Get-ChildItem -Path "D:\a\php-cairo\php-cairo\build\*\Release\php_cairo.dll" -Recurse | Select-Object -First 1 -ExpandProperty FullName

            #     if (-not $dllPath) {
            #       Write-Error "php_cairo.dll not found in any build directory"
            #       exit 1
            #     }

            #     Write-Host "Found DLL at: $dllPath"

            #     # Use dumpbin to check dependencies
            #     Write-Host "Checking dependencies of php_cairo.dll:"
            #     dumpbin /DEPENDENTS "$dllPath"

            #     Write-Host "`nChecking if the DLL is valid:"
            #     dumpbin /HEADERS "$dllPath" | Select-String -Pattern "machine|magic"
            #   shell: powershell

            - name: "Upload test outputs"
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                name: cairo-test-${{ matrix.php-version }}-${{ matrix.arch }}-${{ matrix.ts }}
                path: tests/**/*.log
